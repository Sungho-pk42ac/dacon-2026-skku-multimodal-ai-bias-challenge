### LLaMA-Factory — Qwen3-VL-8B LoRA SFT (v4 클린: 단일토큰 직답, nothink)
### 실행: llamafactory-cli train train/llamafactory/qwen3vl_lora_sft.yaml
### 회의 확정(2026-06-15): 베이스 Qwen2.5-VL-7B → Qwen3-VL-8B 교체. 같은 패밀리라 전환리스크 낮음.

### model
model_name_or_path: Qwen/Qwen3-VL-8B-Instruct   # 2025-09-23 공개(6/1 이전 ✅), Apache-2.0
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 32
lora_alpha: 64
lora_target: all

### dataset — 누출제거 단일토큰 직답 (make_bbq_clean.py 생성)
dataset: bbq_v4                      # data/dataset_info.json (bbq_v4_train.json, 타깃 "0"/"1"/"2")
dataset_dir: data
template: qwen3_vl_nothink           # Qwen3-VL thinking 끄기 → 답만 생성(속도). LLaMA-Factory 0.9.6 등록 확인됨
cutoff_len: 2048                     # 단일토큰 타깃이라 길 필요 없음(속도·VRAM ↓)
max_samples: 100000
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4
### 이미지 토큰/해상도 — 0.5초 예산 위해 축소 (placeholder 학습이라 작아도 무방)
image_max_pixels: 200704            # ~448², 약 256 이미지토큰

### output
output_dir: outputs/sft_v4
logging_steps: 10
save_steps: 300
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: wandb
run_name: bias-sft-v4-qwen3vl

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 5.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
seed: 42
optim: adamw_torch_fused

### acceleration
flash_attn: fa2

### eval
val_size: 0.05
